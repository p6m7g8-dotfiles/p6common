name: Auto PR Orchestrator

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_run:
    workflows: ["Build", "Claude Code Review", "Codex Code Review"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: orchestrator-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  orchestrate:
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Select PR
        id: pr
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            pr_number="${{ github.event.pull_request.number }}"
          else
            pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Gate on PR state and check completion
        id: gate
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.P6_A_GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          owner_repo="${{ github.repository }}"

          state=$(gh pr view "$PR_NUMBER" --repo "$owner_repo" --json state --jq '.state')
          draft=$(gh pr view "$PR_NUMBER" --repo "$owner_repo" --json isDraft --jq '.isDraft')
          head_sha=$(gh pr view "$PR_NUMBER" --repo "$owner_repo" --json headRefOid --jq '.headRefOid')

          if [ "$state" != "OPEN" ] || [ "$draft" = "true" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          checks_json=$(gh api -H "Accept: application/vnd.github+json" "/repos/$owner_repo/commits/$head_sha/check-runs?per_page=100")
          required=("build" "Lint PR title" "claude-review" "codex-review")

          for name in "${required[@]}"; do
            count=$(echo "$checks_json" | jq --arg n "$name" '[.check_runs[] | select(.name == $n)] | length')
            if [ "$count" -eq 0 ]; then
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            status=$(echo "$checks_json" | jq -r --arg n "$name" '[.check_runs[] | select(.name == $n)] | sort_by(.started_at) | last | .status')
            conclusion=$(echo "$checks_json" | jq -r --arg n "$name" '[.check_runs[] | select(.name == $n)] | sort_by(.started_at) | last | .conclusion')
            if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: AI adjudication (Codex + Claude)
        id: ai
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.P6_A_GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"

          codex_body=$(gh pr view "$PR_NUMBER" --repo "$repo" --json comments --jq '[.comments[] | select((.author.login | startswith("github-actions")) or (.author.login == "p6m7g8-automation")) | .body | select(startswith("Codex Autonomous Review:"))] | last // ""')
          claude_body=$(gh pr view "$PR_NUMBER" --repo "$repo" --json comments --jq '[.comments[] | select((.author.login | startswith("github-actions")) or (.author.login | startswith("claude")) or (.author.login == "p6m7g8-automation")) | .body | select((startswith("Claude Autonomous Review:")) or (contains("Code Review Complete")) or (startswith("**Claude finished"))) ] | last // ""')
          if [ -z "$codex_body" ] || [ -z "$claude_body" ]; then
            echo "verdict=iterate" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          codex_incorrect=$(printf '%s' "$codex_body" | grep -Eic 'Overall:\s*patch is incorrect' || true)
          claude_incorrect=$(printf '%s' "$claude_body" | grep -Eic 'Overall:\s*patch is incorrect|🚨\s*\*\*Bug\*\*|\[P1\]|NOT APPROVED|DO NOT MERGE' || true)
          codex_correct=$(printf '%s' "$codex_body" | grep -Eic 'Overall:\s*patch is correct' || true)
          claude_correct=$(printf '%s' "$claude_body" | grep -Eic 'Overall:\s*patch is correct|Code Review Complete|APPROVED|ready to merge' || true)
          codex_findings=$(printf '%s' "$codex_body" | sed -nE 's/.*Findings \(total\):[[:space:]]*([0-9]+).*/\1/p' | tail -n1)
          if [ -z "$codex_findings" ]; then
            codex_findings=999
          fi

          if [ "$codex_incorrect" -gt 0 ] || [ "$claude_incorrect" -gt 0 ]; then
            # Break stale-thread deadlock: codex can report incorrect with zero findings
            # solely because an old unresolved thread exists. In that case allow accept,
            # then resolve threads in the next step.
            if [ "$codex_incorrect" -gt 0 ] && [ "$codex_findings" -eq 0 ] && [ "$claude_correct" -gt 0 ] && [ "$claude_incorrect" -eq 0 ]; then
              echo "verdict=accept" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "verdict=iterate" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$codex_correct" -gt 0 ] && [ "$claude_correct" -gt 0 ]; then
            echo "verdict=accept" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "verdict=iterate" >> "$GITHUB_OUTPUT"

      - name: Iterate by recording adjudication
        if: steps.ai.outputs.verdict == 'iterate'
        env:
          GH_TOKEN: ${{ secrets.P6_A_GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          gh pr comment "$PR_NUMBER" --repo "$repo" --body "Autonomous adjudicator: no Codex/Claude consensus yet. Waiting for next pull_request synchronize change."

      - name: Resolve all unresolved review threads
        if: steps.ai.outputs.verdict == 'accept'
        env:
          GH_TOKEN: ${{ secrets.P6_A_GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          repo="${{ github.event.repository.name }}"

          # shellcheck disable=SC2016
          query='query($owner:String!,$repo:String!,$number:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$number){reviewThreads(first:100){nodes{id isResolved}}}}}'
          threads=$(gh api graphql -f query="$query" -F owner="$owner" -F repo="$repo" -F number="$PR_NUMBER" --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .id' || true)

          count=0
          while IFS= read -r tid; do
            [ -z "$tid" ] && continue
            # shellcheck disable=SC2016
            mutation='mutation($threadId:ID!){resolveReviewThread(input:{threadId:$threadId}){thread{id isResolved}}}'
            gh api graphql -f query="$mutation" -F threadId="$tid" >/dev/null
            count=$((count + 1))
          done <<< "$threads"

          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "Autonomous adjudicator: resolved $count unresolved review thread(s)."

      - name: Final guard for review decision
        id: final_guard
        if: steps.ai.outputs.verdict == 'accept'
        env:
          GH_TOKEN: ${{ secrets.P6_A_GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          decision=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json reviewDecision --jq '.reviewDecision')
          if [ "$decision" = "CHANGES_REQUESTED" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "Autonomous adjudicator: changes are still requested. Waiting for next pull_request synchronize change."
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.ai.outputs.verdict == 'accept' && steps.final_guard.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.P6_A_GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr review "$PR_NUMBER" --repo "${{ github.repository }}" --approve --body "Autonomous approval: Codex and Claude both accepted."

      - name: Enqueue PR
        if: steps.ai.outputs.verdict == 'accept' && steps.final_guard.outputs.ok == 'true'
        uses: p6m7g8-actions/p6-gh-pr-auto-enqueue@main
        with:
          gh_token: ${{ secrets.P6_A_GH_TOKEN }}
